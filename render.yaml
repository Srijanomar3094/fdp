services:
  - type: web
    name: finance-backend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn finance_backend.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: finance-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: finance-db
    databaseName: finance
    user: finance
    plan: free
